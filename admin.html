<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>Hyun2 Admin</title>
    <script>
      try {
        const theme = localStorage.getItem('hyun2.theme');
        if (theme) document.documentElement.dataset.theme = theme;
      } catch {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css?v=20260517-image-pointer-move">
    <script type="module" src="./src/app.js?v=20260517-image-pointer-move"></script>
  </head>
  <body data-admin="true">
    <main class="admin-shell" aria-live="polite">
      <div id="article-root" class="admin-root"></div>
    </main>
  </body>
</html>
